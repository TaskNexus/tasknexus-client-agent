name: Build Release Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            agent_artifact_name: tasknexus-agent.exe
            agent_asset_name: tasknexus-agent-windows-x86_64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            agent_artifact_name: tasknexus-agent
            agent_asset_name: tasknexus-agent-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            agent_artifact_name: tasknexus-agent
            agent_asset_name: tasknexus-agent-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            agent_artifact_name: tasknexus-agent
            agent_asset_name: tasknexus-agent-macos-arm64

    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      MACOS_CODESIGN_CERT_BASE64: ${{ secrets.MACOS_CODESIGN_CERT_BASE64 }}
      MACOS_CODESIGN_CERT_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERT_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
      WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
      WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry/git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('agent/Cargo.lock', 'agent/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Cache Rust target dirs
        uses: actions/cache@v4
        with:
          path: |
            agent/target
          key: ${{ runner.os }}-target-${{ matrix.target }}-${{ hashFiles('agent/Cargo.lock', 'agent/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ matrix.target }}-
            ${{ runner.os }}-target-

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build agent executable
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: agent

      - name: Sign binaries (Windows, optional)
        if: runner.os == 'Windows' && env.WINDOWS_CODESIGN_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_BASE64))
          $timestampUrl = $env:WINDOWS_TIMESTAMP_URL
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }

          & signtool sign /f $certPath /p $env:WINDOWS_CODESIGN_CERT_PASSWORD /fd SHA256 /tr $timestampUrl /td SHA256 "agent/target/${{ matrix.target }}/release/${{ matrix.agent_artifact_name }}"

      - name: Sign binaries (macOS, optional)
        if: runner.os == 'macOS' && env.MACOS_CODESIGN_CERT_BASE64 != '' && env.MACOS_CODESIGN_IDENTITY != ''
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/codesign.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/tasknexus-build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_CODESIGN_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CODESIGN_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          codesign --force --sign "$MACOS_CODESIGN_IDENTITY" --options runtime --timestamp "agent/target/${{ matrix.target }}/release/${{ matrix.agent_artifact_name }}"

      - name: Create dist directory
        run: mkdir -p dist
        shell: bash

      - name: Copy artifacts
        run: |
          cp "agent/target/${{ matrix.target }}/release/${{ matrix.agent_artifact_name }}" "dist/${{ matrix.agent_asset_name }}"
        shell: bash

      - name: Verify build
        run: |
          if [[ "${{ matrix.target }}" != "aarch64"* ]]; then
            ./dist/${{ matrix.agent_asset_name }} --help
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.agent_asset_name }}
          path: |
            dist/${{ matrix.agent_asset_name }}
          retention-days: 30

      - name: Upload config example (once)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: config.example.yaml
          path: agent/config.example.yaml
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -maxdepth 3 -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done
          ls -lah release-assets

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
